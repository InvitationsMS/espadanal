name: Deploy Vite site to Pages

on:
  push:
    branches: ['main']

  # Permite ejecutar esto manualmente desde la pestaña de Actions
  workflow_dispatch:

# Otorga permisos al GITHUB_TOKEN para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite una sola ejecución a la vez
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Trabajo de despliegue
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Especificamos que suba la carpeta dist generada por Vite
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
